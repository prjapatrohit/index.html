<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Reviewer Opportunity</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    min-height:100vh;
}
.top-section{
    background:#111;
    color:#fff;
    text-align:center;
    padding:40px 15px;
}
.logo{
    font-size:48px;
    margin-bottom:15px;
}
h1{
    font-size:2rem;
    line-height:1.25;
}
.highlight{color:#e53935;}

.content{
    width:100%;
    max-width:500px;
    margin:0 auto;
    padding:30px 20px;
}

.content h2{
    text-align:center;
    color:#d63a3a;
    margin-bottom:25px;
    font-size:1.9rem;
}

.steps p{
    font-size:1rem;
    line-height:1.6;
    margin:16px 0;
    color:#333;
}

.btn-wrap{
    text-align:center;
    margin-top:30px;
}

.cta-btn{
    display:inline-block;
    width:100%;
    max-width:320px;
    text-align:center;
    background:#e50914;
    color:#fff;
    text-decoration:none;
    padding:18px 20px;
    font-size:1.25rem;
    font-weight:bold;
    border-radius:6px;
}

@media (max-width:480px){
    h1{font-size:1.7rem;}
    .content h2{font-size:1.6rem;}
    .steps p{font-size:0.95rem;}
    .cta-btn{
        max-width:100%;
        font-size:1.15rem;
    }
}
</style>
</head>
<body>

<div class="top-section">
    <div class="logo">🎬</div>
    <h1>Want To Become A<br><span class="highlight">Movie Reviewer?</span></h1>
</div>

<div class="content">
    <h2>Steps To Qualify:</h2>

    <div class="steps">
        <p><strong>1.</strong> Click the START NOW button below</p>
        <p><strong>2.</strong> Enter your email and basic information</p>
        <p><strong>3.</strong> Complete a short qualification survey</p>
        <p><strong>4.</strong> Start reviewing movies and get rewarded</p>
    </div>

    <div class="btn-wrap">
        <a class="cta-btn" href="https://giftclick.org/aff_c?offer_id=4721&aff_id=104785&source=org">
            START NOW →
        </a>
    </div>
</div>

</body>
</html>
